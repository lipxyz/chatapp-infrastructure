{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "slurmtalks.fullname" . }}-ingress
  labels:
    {{- include "slurmtalks.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  rules:
    - host: {{ .Values.ingress.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "slurmtalks.frontendFullname" . }}
                port:
                  number: {{ .Values.ingress.servicePort | default 3000 }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "slurmtalks.backendFullname" . }}
                port:
                  number: {{ .Values.backend.servicePort | default 8080 }}
{{- end }}
