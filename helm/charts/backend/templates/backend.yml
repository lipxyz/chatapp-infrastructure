{{- $root := . }}

{{- $backend := dict 
    "name" "backend" 
    "kind" "Deployment" 
    "apiVersion" "apps/v1" 
    "replicas" .Values.replicas
    "strategy" .Values.strategy
    "image" .Values.image
    "ports" .Values.ports
    "env" .Values.env
    "resources" .Values.resources
    "nodeSelector" .Values.nodeSelector
    "affinity" .Values.affinity
    "restartPolicy" .Values.restartPolicy
    "livenessProbe" .Values.livenessProbe
    "readinessProbe" .Values.readinessProbe
-}}

{{- with .Values.pod }}
{{- $backend = merge $backend (dict
    "serviceAccountName" .serviceAccountName
    "imagePullSecrets"  .imagePullSecrets
    "imagePullSecrets"  .imagePullSecrets
) }}
{{- end }}

{{- with .Values.pod.prometheus }}
{{- $backend = merge $backend (dict "prometheus" .) }}
{{- end }}

{{- with .Values.volumeMounts }}
{{- $backend = merge $backend (dict "volumeMounts" .) }}
{{- end }}

{{- with .Values.volumes }}
{{- $backend = merge $backend (dict "volumes" .) }}
{{- end }}


{{ include "manifest.template" (dict "root" $root "config" $backend) }}

---
{{- $service := dict
    "name" "backend"
    "kind" "Service"
    "apiVersion" "v1"
    "ports" .Values.service.ports
    "type" .Values.service.type
-}}

{{ include "manifest.template" (dict "root" $root "config" $service) }}