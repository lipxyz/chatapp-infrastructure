name: frontend
image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent
replicas: 1
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
nodeSelector:
  kubernetes.io/hostname: node-1.s023943.slurm.io
affinity:
  matchExpressions:
    - key: kubernetes.io/hostname
      operator: In
      values:
        - node-1.s023943.slurm.io
restartPolicy: Always
ports:
  - containerPort: 3000 

pod:
  serviceAccountName: gitlab-runner
  imagePullSecrets:
    - name: gitlab-registry
service:
  type: ClusterIP      
  ports:
    - port: 80        
      targetPort: 3000

envFromConfigMap:
  NEXT_PUBLIC_BACKEND_URL:
    name: slurmtalks-config
    key: NEXT_PUBLIC_BACKEND_URL

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3



volumeMounts: []
volumes: []

